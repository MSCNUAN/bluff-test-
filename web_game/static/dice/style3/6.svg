  <rect x="4" y="4" width="72" height="72" rx="14" ry="14" fill="url(#bg)" stroke="#1a252f" stroke-width="2" filter="url(#shadow)"/>
  <circle cx="26" cy="22" r="9" fill="url(#dot)"/>
  <circle cx="54" cy="22" r="9" fill="url(#dot)"/>
  <circle cx="26" cy="40" r="9" fill="url(#dot)"/>
  <circle cx="54" cy="40" r="9" fill="url(#dot)"/>
  <circle cx="26" cy="58" r="9" fill="url(#dot)"/>
  <circle cx="54" cy="58" r="9" fill="url(#dot)"/>
